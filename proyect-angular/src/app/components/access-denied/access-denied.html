<main class="access-page">
  <section class="access-card">
    <div class="brand-mark">AP</div>
    <h1>Acceso no permitido</h1>
    <p>
      Este portal es solo para administradores y trabajadores. Tu cuenta no tiene permisos
      para entrar al panel de gestion.
    </p>

    <div class="actions">
      <button class="btn btn-primary" type="button" (click)="logout()">Cerrar sesion</button>
      <a class="btn btn-outline-secondary" routerLink="/login">Volver al login</a>
    </div>
  </section>
</main>
